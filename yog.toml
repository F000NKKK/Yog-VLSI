[mod]
id          = "yog-vlsi"
name        = "Yog VLSI"
version     = "0.1.0"
description = "Very Large Scale Integration — design and fabricate redstone microchips with a Rust-accelerated simulation VM. Multi-tier workbench, ALU block, and chip-to-chip linking."
authors     = ["F000NK", "Yog Team"]
license     = "AGPL-3.0-only"

[dependencies]
serde      = { version = "*", features = ["derive"] }
serde_json = "*"
uuid       = { version = "*", features = ["v4"] }

## `yog run <name>` — build, drop the .yog into the loader's own Gradle dev-run
# instance, then launch it.
[run.forge-1.21.1]
export_dir = "../Yog-Mod-Loader/forge/run/yog-mods"
command    = "gradlew"
args       = ["runClient", "-Pminecraft_version=1.21.1"]
cwd        = "../Yog-Mod-Loader/forge"

[run.forge-1.20.1]
export_dir = "../Yog-Mod-Loader/forge/run/yog-mods"
command    = "gradlew"
args       = ["runClient", "-Pminecraft_version=1.20.1"]
cwd        = "../Yog-Mod-Loader/forge"

[run.fabric-1.21.1]
export_dir = "../Yog-Mod-Loader/fabric/run/yog-mods"
command    = "gradlew"
args       = ["runClient", "-Pminecraft_version=1.21.1"]
cwd        = "../Yog-Mod-Loader/fabric"

[run.fabric-1.20.1]
