[mod]
id          = "yog-vlsi"
name        = "Yog VLSI"
version     = "0.1.0"
description = "Very Large Scale Integration — design and fabricate redstone microchips with a Rust-accelerated simulation VM. Multi-tier workbench, ALU block, and chip-to-chip linking."
authors     = ["F000NK", "Yog Team"]
license     = "AGPL-3.0-only"

[dependencies]
serde      = { version = "*", features = ["derive"] }
serde_json = "*"
uuid       = { version = "*", features = ["v4"] }

[run.fabric_1_21_1]
export_dir = "~/Projects/Yog-Mod-Loader/fabric/run/yog-mods"
command    = "java"
args       = ["-jar", "server.jar", "--nogui"]
cwd        = "../my-instance"

[run.forge_1_21_1]
export_dir = "~/Projects/Yog-Mod-Loader/fabric/run/yog-mods"
command    = "java"
args       = ["-jar", "server.jar", "--nogui"]
cwd        = "../my-instance"

[run.neoforge_1_21_1]
export_dir = "~/Projects/Yog-Mod-Loader/fabric/run/yog-mods"
command    = "java"
args       = ["-jar", "server.jar", "--nogui"]
cwd        = "../my-instance"

